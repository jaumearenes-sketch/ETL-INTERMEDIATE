exposures:
  - name: customer_performance_dashboard
    label: Customer Performance Dashboard
    type: dashboard
    maturity: medium
    url: https://your-bi-tool.example.com/dashboards/customer-performance
    description: >
      Dashboard orientado al seguimiento del rendimiento comercial por cliente.
      Consume métricas de pedidos y atributos de la dimensión de cliente para analizar
      revenue, actividad, segmentación y comportamiento comercial en distintos cortes
      temporales y geográficos.

    depends_on:
      - ref('fact_orders')
      - ref('dim_customer')

    owner:
      name: Analytics
      email: analytics@example.com
